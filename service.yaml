apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: inventory-app
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '3'
        # run.googleapis.com/cloudsql-instances: analytical-rain-485717-r5:us-central1:import-gestion-inventario-sql
    spec:
      containers:
      - image: gcr.io/analytical-rain-485717-r5/inventory-app:latest
        env:
        - name: DB_USER
          value: leandro_guias
        - name: DB_PASSWORD
          value: '!39o.129mAacasu1048x$.'
        - name: DB_NAME
          value: app_import
        - name: DB_HOST
          value: 34.133.83.104
        # - name: INSTANCE_CONNECTION_NAME
        #   value: analytical-rain-485717-r5:us-central1:import-gestion-inventario-sql
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /secrets/credentials.json
        - name: DEEPSEEK_API_KEY
          value: sk-d3807b35d3804432bd6371fd00c27733
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        volumeMounts:
        - mountPath: /secrets
          name: google-credentials
      volumes:
      - name: google-credentials
        secret:
          items:
          - key: latest
            path: credentials.json
          secretName: GOOGLE_CREDENTIALS
